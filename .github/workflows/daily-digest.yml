name: Fetch Content

on:
  schedule:
    - cron: '0 1 * * *'   # 9:00 AM Beijing (UTC+8 = 01:00 UTC)
  workflow_dispatch:        # allow manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit feeds back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Fetch all sources
        run: node fetch-all.js
        working-directory: scripts
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          X_BEARER_TOKEN:  ${{ secrets.X_BEARER_TOKEN }}

      - name: Commit updated feeds
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feeds/all-feeds.json
          git diff --staged --quiet || git commit -m "chore: update feeds $(date -u '+%Y-%m-%d')"
          git push
